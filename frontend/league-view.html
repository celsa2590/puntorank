<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PuntoRank - Liga</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .brand {
      color: #8dff9f;
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      max-width: 850px;
    }

    .meta {
      color: #aaa;
      line-height: 1.5;
    }

    .row {
      border-bottom: 1px solid #333;
      padding: 12px 0;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #111;
      color: white;
      margin-top: 8px;
      margin-right: 8px;
    }

    button, .btn {
      background: #8dff9f;
      color: #111;
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }

    .secondary {
      background: #1a1a1a;
      color: white;
      border: 1px solid #333;
    }

input,
select {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
  margin-top: 8px;
  margin-right: 8px;
}

  </style>
</head>
<body>

<a class="btn secondary" href="club-dashboard.html">← Volver</a>

<div class="brand">Liga PuntoRank</div>

<div class="card">
  <h2>Detalle</h2>
  <div id="leagueDetail" class="meta">Cargando liga...</div>
</div>

<div class="card">
  <h2>Parejas inscritas</h2>

  <div style="margin-bottom:18px;">
    <select id="player1Select"></select>
    <select id="player2Select"></select>

    <input
      id="pairName"
      placeholder="Nombre pareja opcional"
    >

    <button onclick="createPair()">
      Agregar pareja
    </button>
  </div>

  <div id="pairsList">Cargando parejas...</div>
</div>




<div class="card">
  <h2>Fixture</h2>
  <button onclick="generateFixture()">Generar fixture</button>
  <div id="matchesList" style="margin-top:16px;">Cargando partidos...</div>
</div>

<div class="card">
  <h2>Tabla de posiciones</h2>
  <button onclick="finishLeague()">Finalizar liga</button>
  <div id="finishMessage" class="meta" style="margin-top:12px;"></div>
  <div id="standingsList" style="margin-top:16px;">Cargando tabla...</div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";

const params = new URLSearchParams(window.location.search);
const leagueId = params.get("id");
let players = [];


if (!leagueId) {
  alert("Falta id de liga");
}

async function loadLeague() {
  const response = await fetch(`${API_URL}/club/1/leagues`);
  const leagues = await response.json();

  const league = leagues.find(l => l.id == leagueId);

  if (!league) {
    document.getElementById("leagueDetail").innerHTML = "Liga no encontrada.";
    return;
  }

  document.getElementById("leagueDetail").innerHTML = `
    Nombre: ${league.name}<br>
    Categoría: ${league.category}<br>
    Género: ${league.gender}<br>
    Formato: ${league.format}<br>
    Estado: ${league.status}<br>
    Parejas: ${league.pairs_count}
  `;
}

async function loadPairs() {
  const response = await fetch(`${API_URL}/leagues/${leagueId}/pairs`);
  const pairs = await response.json();

  const container = document.getElementById("pairsList");

  if (pairs.length === 0) {
    container.innerHTML = "Aún no hay parejas inscritas.";
    return;
  }

  container.innerHTML = pairs.map(p => `
    <div class="row">
      <strong>${p.pair_name || `${p.player_1_name} / ${p.player_2_name}`}</strong><br>
      <span class="meta">${p.player_1_name} / ${p.player_2_name}</span>
    </div>
  `).join("");
}

async function generateFixture() {
  const response = await fetch(`${API_URL}/leagues/${leagueId}/generate-fixture`, {
    method: "POST"
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.detail || "No se pudo generar fixture.");
    return;
  }

  await loadMatches();
  await loadStandings();
}

async function loadMatches() {
  const response = await fetch(`${API_URL}/leagues/${leagueId}/matches`);
  const matches = await response.json();

  const container = document.getElementById("matchesList");

  if (matches.length === 0) {
    container.innerHTML = "Aún no hay partidos generados.";
    return;
  }

  container.innerHTML = matches.map(m => `
    <div class="row">
      <strong>Ronda ${m.round_number}</strong><br>
      <span class="meta">${m.pair_a_name} vs ${m.pair_b_name}</span><br>

      <input
        id="score_${m.id}"
        placeholder="Ej: 6-4 7-5"
        value="${m.score || ""}"
      >

      <button onclick="saveLeagueResult(${m.id}, ${m.pair_a_id})">
        Ganó ${m.pair_a_name}
      </button>

      <button onclick="saveLeagueResult(${m.id}, ${m.pair_b_id})">
        Ganó ${m.pair_b_name}
      </button>

      <div class="meta">
        Estado: ${m.status} · Resultado: ${m.score || "sin resultado"}
      </div>
    </div>
  `).join("");
}

async function saveLeagueResult(matchId, winnerPairId) {
  const score = document.getElementById(`score_${matchId}`).value.trim();

  if (!score) {
    alert("Debes ingresar el resultado.");
    return;
  }

  const response = await fetch(`${API_URL}/league-matches/${matchId}/result`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      score: score,
      winner_pair_id: winnerPairId
    })
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.detail || "No se pudo guardar resultado.");
    return;
  }

  await loadMatches();
  await loadStandings();
}

async function loadStandings() {
  const response = await fetch(`${API_URL}/leagues/${leagueId}/standings`);
  const standings = await response.json();

  const container = document.getElementById("standingsList");

  if (standings.length === 0) {
    container.innerHTML = "Aún no hay tabla.";
    return;
  }

  container.innerHTML = standings.map((row, index) => `
    <div class="row">
      <strong>${index + 1}. ${row.pair_name}</strong><br>
      <span class="meta">
        PJ: ${row.played} · PG: ${row.wins} · PP: ${row.losses} · Pts: ${row.points}
      </span>
    </div>
  `).join("");
}

async function finishLeague() {
  const ok = confirm("¿Seguro que deseas finalizar la liga? Esto procesará el ranking.");
  if (!ok) return;

  const response = await fetch(`${API_URL}/leagues/${leagueId}/finish`, {
    method: "POST"
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.detail || "No se pudo finalizar la liga.");
    return;
  }

  document.getElementById("finishMessage").innerHTML =
    "✅ Liga finalizada correctamente.";

  await loadLeague();
  await loadStandings();
}

async function loadPlayers() {

  const response = await fetch(
    `${API_URL}/clubs/1/players`
  );

  players = await response.json();

  const p1 = document.getElementById("player1Select");
  const p2 = document.getElementById("player2Select");

  const options = players.map(p => `
    <option value="${p.id}">
      ${p.name}
    </option>
  `).join("");

  p1.innerHTML = options;
  p2.innerHTML = options;
}

async function createPair() {

  const player1 = parseInt(
    document.getElementById("player1Select").value
  );

  const player2 = parseInt(
    document.getElementById("player2Select").value
  );

  const pairName =
    document.getElementById("pairName").value.trim();

  if (player1 === player2) {
    alert("No puedes seleccionar la misma jugadora.");
    return;
  }

  const response = await fetch(
    `${API_URL}/leagues/${leagueId}/pairs`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        player_1_id: player1,
        player_2_id: player2,
        pair_name: pairName || null
      })
    }
  );

  const result = await response.json();

  if (!response.ok) {
    alert(result.detail || "No se pudo crear pareja.");
    return;
  }

  document.getElementById("pairName").value = "";

  await loadPairs();
  await loadStandings();
}

loadLeague();
loadPairs();
loadMatches();
loadStandings();
loadPlayers();
</script>

</body>
</html>
