<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuntoRank - Jugadores</title>
  <link rel="stylesheet" href="theme.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C2T3VH6Q5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-5C2T3VH6Q5");
  </script>
</head>
<body>
<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

<div class="brand">Jugadores</div>

<div class="meta" id="clubLabel"></div>

<div class="card">
  <h2>Crear jugador</h2>

  <input id="playerName" placeholder="Nombre completo">

  <input id="playerEmail" placeholder="Email">

  <select id="playerGender">
    <option value="femenino">Femenino</option>
    <option value="masculino">Masculino</option>
  </select>

  <select id="playerCategory">
    <option>6ta</option>
    <option>5ta</option>
    <option>4ta</option>
    <option>3era</option>
    <option>2da</option>
    <option>1era</option>
  </select>

  <select id="playerSide">
    <option value="drive">Drive</option>
    <option value="reves">Revés</option>
  </select>

  <button onclick="createPlayer()">
    Crear jugador
  </button>
</div>

<div class="card">
  <h2>Jugadores registrados</h2>

  <div id="playersList">
    Cargando jugadores...
  </div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";

const clubId = localStorage.getItem("club_id");
const clubName = localStorage.getItem("club_name");

if (!clubId) {
  window.location.href = "club-login.html";
}

document.getElementById("clubLabel").innerText =
  `Club: ${clubName}`;

async function loadPlayers() {

  const response = await fetch(
    `${API_URL}/clubs/${clubId}/players`
  );

  const players = await response.json();

  const container =
    document.getElementById("playersList");

  if (players.length === 0) {
    container.innerHTML =
      "Aún no hay jugadores registrados.";
    return;
  }

  container.innerHTML = players.map(p => `
    <div class="row">

      <strong>
        ${p.name}
      </strong><br>

      <span class="meta">
        ${p.category} · ${p.gender}<br>
        ${p.side}<br>
        Rating: ${p.rating || 1000}
      </span><br>

      <a class="btn" href="player-profile.html?id=${p.id}">
        Ver perfil
      </a>

    </div>
  `).join("");
}

async function createPlayer() {

  const response = await fetch(
    `${API_URL}/register`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: document.getElementById("playerName").value,
        email: document.getElementById("playerEmail").value,
        club_id: parseInt(clubId),
        gender: document.getElementById("playerGender").value,
        category: document.getElementById("playerCategory").value,
        side: document.getElementById("playerSide").value
      })
    }
  );

  const result = await response.json();

  if (!response.ok) {
    alert(result.detail || "No se pudo crear jugador.");
    return;
  }

  document.getElementById("playerName").value = "";
  document.getElementById("playerEmail").value = "";

  await loadPlayers();
}

loadPlayers();
</script>

</body>
</html>
