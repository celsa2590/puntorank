<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar contraseña | PuntoRank</title>
  <link rel="stylesheet" href="theme.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C2T3VH6Q5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-5C2T3VH6Q5");
  </script>
</head>
<body>
<div class="top-nav">
  <a class="nav-icon" href="club-dashboard.html">← Volver</a>
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
</div>

<div class="container">
  <div class="brand">Cambiar contraseña</div>
  <div class="subtitle">Actualiza la contraseña de acceso del club.</div>

  <div class="card">
    <label>Contraseña actual</label>
    <input type="password" id="currentPassword">

    <label>Nueva contraseña</label>
    <input type="password" id="newPassword">

    <label>Repetir nueva contraseña</label>
    <input type="password" id="repeatPassword">

    <button onclick="changePassword()">Guardar contraseña</button>

    <div id="message" class="message"></div>
  </div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";
const token = localStorage.getItem("club_token");

if (!token) {
  window.location.href = "club-login.html";
}

async function changePassword() {
  const currentPassword = document.getElementById("currentPassword").value;
  const newPassword = document.getElementById("newPassword").value;
  const repeatPassword = document.getElementById("repeatPassword").value;
  const message = document.getElementById("message");

  message.innerHTML = "";

  if (!currentPassword || !newPassword || !repeatPassword) {
    message.innerHTML = "❌ Completa todos los campos.";
    return;
  }

  if (newPassword !== repeatPassword) {
    message.innerHTML = "❌ Las nuevas contraseñas no coinciden.";
    return;
  }

  const response = await fetch(`${API_URL}/club/change-password`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      token,
      current_password: currentPassword,
      new_password: newPassword
    })
  });

  const result = await response.json();

  if (!response.ok) {
    message.innerHTML = `❌ ${result.detail || "No se pudo cambiar la contraseña."}`;
    return;
  }

  message.innerHTML = "✅ Contraseña actualizada correctamente.";

  document.getElementById("currentPassword").value = "";
  document.getElementById("newPassword").value = "";
  document.getElementById("repeatPassword").value = "";
}
</script>
</body>
</html>
