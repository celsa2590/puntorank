<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuperar contraseña - PuntoRank</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

<div class="card" style="max-width:520px;margin:60px auto;">
  <h1>Recuperar contraseña</h1>
  <p class="meta">Ingresa el correo asociado a tu perfil PuntoRank.</p>

  <label>Correo</label>
  <input id="email" type="email" placeholder="tu@email.com">

  <button onclick="sendReset()">Enviar instrucciones</button>

  <div id="message" class="meta" style="margin-top:16px;"></div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";

async function sendReset() {
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("message");

  if (!email) {
    msg.innerHTML = "Ingresa tu correo.";
    return;
  }

  const response = await fetch(`${API_URL}/player/forgot-password`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });

  const result = await response.json();

  msg.innerHTML = result.message || "Revisa tu correo.";
}
</script>

</body>
</html>
