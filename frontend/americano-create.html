<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuntoRank - Crear Americano</title>
  <link rel="stylesheet" href="theme.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C2T3VH6Q5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-5C2T3VH6Q5");
  </script>
</head>
<body>
<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

  <div class="brand">Crear Americano</div>
  <div class="subtitle" id="clubInfo"></div>

  <div class="card" id="createCard">
    <h2>Datos del americano</h2>

    <form id="americanoForm">
      <label>Nombre</label>
      <input type="text" id="name" required placeholder="Ej: Americano Femenino 5ta">

      <label>Categoría</label>
      <select id="category" required>
        <option value="">Selecciona</option>
        <option value="7ma">7ma</option>
        <option value="6ta">6ta</option>
        <option value="5ta">5ta</option>
        <option value="4ta">4ta</option>
        <option value="3era">3era</option>
        <option value="2da">2da</option>
        <option value="1era">1era</option>
      </select>

      <label>Género</label>
      <select id="gender" required>
        <option value="">Selecciona</option>
        <option value="femenino">Femenino</option>
        <option value="masculino">Masculino</option>
        <option value="mixto">Mixto</option>
      </select>

      <label for="pairsTarget">Formato</label>

      <select id="pairsTarget" onchange="updateMinimumCourts()" >
        <option value="4">
          Cuadrangular · 4 parejas
        </option>

        <option value="6">
          Hexagonal · 6 parejas
        </option>

        <option value="8">
          Octagonal · 8 parejas · 28 partidos
        </option>

      </select>

      <label>Cantidad de canchas</label>
      <input type="number" id="courts" min="1" required value="2">

      <label>Duración bloque</label>
      <select id="duration" required>
        <option value="90">1 hora 30 min</option>
        <option value="120">2 horas</option>
        <option value="180">3 horas</option>
      </select>

      <button type="submit">Crear americano</button>
    </form>

    <div class="message" id="createMessage"></div>
  </div>


<script>
  const API_URL = "https://puntorank-backend.onrender.com";

  const clubId = localStorage.getItem("club_id");
  const clubName = localStorage.getItem("club_name");

  if (!clubId) {
    window.location.href = "club-login.html";
  }

  document.getElementById("clubInfo").innerText = `Club: ${clubName}`;

document
  .getElementById("americanoForm")
  .addEventListener(
    "submit",
    async function (event) {
      event.preventDefault();

      const message =
        document.getElementById("createMessage");

      const submitButton =
        event.submitter;

      const payload = {
        club_id: Number(clubId),

        name: document
          .getElementById("name")
          .value
          .trim(),

        category:
          document.getElementById("category").value,

        gender:
          document.getElementById("gender").value,

        pairs_target: Number(
          document.getElementById(
            "pairsTarget"
          ).value
        ),

        courts: Number(
          document.getElementById("courts").value
        ),

        duration_minutes: Number(
          document.getElementById("duration").value
        )
      };

      if (!payload.name) {
        message.textContent =
          "❌ Debes ingresar un nombre.";
        return;
      }

      message.textContent =
        "Creando evento...";

      if (submitButton) {
        submitButton.disabled = true;
      }

      try {
        const response = await fetch(
          `${API_URL}/americanos`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          }
        );

        const result = await response.json();

        if (!response.ok) {
          message.textContent =
            `❌ ${
              result.detail ||
              "No se pudo crear el evento"
            }`;

          return;
        }

        window.location.href =
          `americano-view.html?id=${result.id}`;

      } catch (error) {
        console.error(error);

        message.textContent =
          "❌ No fue posible conectar con PuntoRank.";

      } finally {
        if (submitButton) {
          submitButton.disabled = false;
        }
      }
    }
  );

function updateEventSummary() {
  const pairsTarget = Number(
    document.getElementById("pairsTarget").value
  );

  const courtsInput =
    document.getElementById("courts");

  const courts = Math.max(
    1,
    Number(courtsInput.value) || 1
  );

  courtsInput.min = "1";

  const matchesPerRound =
    pairsTarget / 2;

  const rounds =
    pairsTarget - 1;

  const totalMatches =
    pairsTarget * (pairsTarget - 1) / 2;

  const secondShiftMatches = Math.max(
    0,
    matchesPerRound - courts
  );

  const help =
    document.getElementById("courtsHelp");

  let text =
    `${rounds} rondas · ` +
    `${matchesPerRound} partidos por ronda · ` +
    `${totalMatches} partidos en total.`;

  if (secondShiftMatches > 0) {
    text +=
      ` Con ${courts} cancha${courts === 1 ? "" : "s"}, ` +
      `${secondShiftMatches} partido` +
      `${secondShiftMatches === 1 ? "" : "s"} ` +
      `por ronda deberá${secondShiftMatches === 1 ? "" : "n"} ` +
      `jugarse en un segundo turno.`;
  } else {
    text +=
      " Todos los partidos de una ronda pueden " +
      "jugarse simultáneamente.";
  }

  help.textContent = text;
}

updateEventSummary();

</script>

</body>
</html>
