<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PuntoRank - Crear Americano</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1b2b22 0%, #0f0f0f 45%);
      color: white;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .brand {
      color: #8dff9f;
      font-size: 38px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #bbb;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(26, 26, 26, 0.95);
      border: 1px solid #333;
      border-radius: 22px;
      padding: 20px;
      max-width: 620px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      color: #ccc;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #111;
      color: white;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      margin-top: 18px;
      background: #8dff9f;
      color: #111;
      border: none;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .secondary {
      background: #1a1a1a;
      color: white;
      border: 1px solid #333;
    }

    .player-row {
      padding: 10px 0;
      border-bottom: 1px solid #333;
      color: #ddd;
    }

    .hidden {
      display: none;
    }

    .message {
      margin-top: 12px;
      color: #8dff9f;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="brand">Crear Americano</div>
  <div class="subtitle" id="clubInfo"></div>

  <div class="card" id="createCard">
    <h2>Datos del americano</h2>

    <form id="americanoForm">
      <label>Nombre</label>
      <input type="text" id="name" required placeholder="Ej: Americano Femenino 5ta">

      <label>Categoría</label>
      <select id="category" required>
        <option value="">Selecciona</option>
        <option value="6ta">6ta</option>
        <option value="5ta">5ta</option>
        <option value="4ta">4ta</option>
        <option value="3era">3era</option>
        <option value="2da">2da</option>
        <option value="1era">1era</option>
      </select>

      <label>Género</label>
      <select id="gender" required>
        <option value="">Selecciona</option>
        <option value="femenino">Femenino</option>
        <option value="masculino">Masculino</option>
      </select>

      <label>Cantidad de canchas</label>
      <input type="number" id="courts" min="1" required value="2">

      <label>Duración bloque</label>
      <select id="duration" required>
        <option value="90">1 hora 30 min</option>
        <option value="120">2 horas</option>
        <option value="180">3 horas</option>
      </select>

      <button type="submit">Crear americano</button>
    </form>

    <div class="message" id="createMessage"></div>
  </div>

  <div class="card hidden" id="playersCard">
    <h2>Agregar jugadores</h2>

    <form id="playerForm">
      <label>Jugador existente</label>
      <select id="existingPlayer">
        <option value="">Cargando jugadores...</option>
      </select>

      <button type="button" onclick="addExistingPlayer()">Agregar jugador existente</button>

      <hr style="border-color:#333;margin:22px 0;">

      <h3>Crear jugador rápido</h3>

      <label>Nombre</label>
      <input type="text" id="newName" placeholder="Nombre jugador">

      <label>Email opcional</label>
      <input type="email" id="newEmail" placeholder="email@dominio.com">

      <label>Lado</label>
      <select id="newSide">
        <option value="">Selecciona</option>
        <option value="drive">Drive</option>
        <option value="reves">Revés</option>
        <option value="ambos">Ambos</option>
      </select>

      <button type="button" onclick="addNewPlayer()">Crear y agregar</button>
    </form>

    <div class="message" id="playerMessage"></div>

    <h3>Jugadores inscritos</h3>
    <div id="playersList"></div>

    <button class="secondary" onclick="goDashboard()">Volver al panel</button>
  </div>

<script>
  const API_URL = "https://puntorank-backend.onrender.com";

  const clubId = localStorage.getItem("club_id");
  const clubName = localStorage.getItem("club_name");
  let americanoId = null;

  if (!clubId) {
    window.location.href = "club-login.html";
  }

  document.getElementById("clubInfo").innerText = `Club: ${clubName}`;

  document.getElementById("americanoForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const payload = {
      club_id: parseInt(clubId),
      name: document.getElementById("name").value.trim(),
      category: document.getElementById("category").value,
      gender: document.getElementById("gender").value,
      courts: parseInt(document.getElementById("courts").value),
      duration_minutes: parseInt(document.getElementById("duration").value)
    };

    try {
      const response = await fetch(`${API_URL}/americanos`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });

      if (!response.ok) throw new Error("No se pudo crear americano");

      const americano = await response.json();
      americanoId = americano.id;

      document.getElementById("createMessage").innerText = "Americano creado correctamente ✅";
      document.getElementById("playersCard").classList.remove("hidden");

      await loadPlayers();
      await loadAmericanoPlayers();

    } catch (error) {
      console.error(error);
      document.getElementById("createMessage").innerText = "Error creando americano.";
    }
  });

  async function loadPlayers() {
    const response = await fetch(`${API_URL}/players`);
    const players = await response.json();

    const select = document.getElementById("existingPlayer");
    select.innerHTML = `<option value="">Selecciona jugador</option>`;

    players.forEach(player => {
      const option = document.createElement("option");
      option.value = player.id;
      option.textContent = player.name;
      select.appendChild(option);
    });
  }

  async function addExistingPlayer() {
    const playerId = document.getElementById("existingPlayer").value;

    if (!playerId || !americanoId) return;

    await fetch(`${API_URL}/americanos/${americanoId}/players`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ player_id: parseInt(playerId) })
    });

    document.getElementById("playerMessage").innerText = "Jugador agregado ✅";
    await loadAmericanoPlayers();
  }

  async function addNewPlayer() {
    const name = document.getElementById("newName").value.trim();
    if (!name || !americanoId) return;

    const payload = {
      name,
      email: document.getElementById("newEmail").value.trim() || null,
      gender: document.getElementById("gender").value,
      category: document.getElementById("category").value,
      side: document.getElementById("newSide").value || null
    };

    await fetch(`${API_URL}/americanos/${americanoId}/players`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    document.getElementById("newName").value = "";
    document.getElementById("newEmail").value = "";
    document.getElementById("newSide").value = "";

    document.getElementById("playerMessage").innerText = "Jugador creado y agregado ✅";

    await loadPlayers();
    await loadAmericanoPlayers();
  }

  async function loadAmericanoPlayers() {
    const response = await fetch(`${API_URL}/americanos/${americanoId}/players`);
    const players = await response.json();

    const list = document.getElementById("playersList");

    if (players.length === 0) {
      list.innerHTML = "Aún no hay jugadores inscritos.";
      return;
    }

    list.innerHTML = players.map(p => `
      <div class="player-row">
        ${p.name} · ${p.category || ""} · ${p.side || "sin lado"} · ${p.paid ? "Pagado" : "No pagado"}
      </div>
    `).join("");
  }

  function goDashboard() {
    window.location.href = "club-dashboard.html";
  }
</script>

</body>
</html>
