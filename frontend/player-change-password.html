<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuntoRank - Cambiar contraseña</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .auth-shell{max-width:500px;margin:0 auto;}
    .notice{margin-bottom:18px;padding:14px;border-radius:14px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
  </style>
</head>
<body>
<div class="auth-shell">
  <div class="brand" style="margin-top:24px;">Crea tu contraseña</div>
  <div class="subtitle">Por seguridad debes reemplazar la contraseña temporal antes de continuar.</div>

  <div class="card">
    <div class="notice">
      Usa la contraseña temporal que recibiste por correo y elige una nueva contraseña de al menos 8 caracteres.
    </div>

    <form id="changePasswordForm">
      <label>Contraseña temporal</label>
      <input id="currentPassword" type="password" autocomplete="current-password" required>

      <label>Nueva contraseña</label>
      <input id="newPassword" type="password" autocomplete="new-password" minlength="8" required>

      <label>Confirmar nueva contraseña</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>

      <button id="submitButton" type="submit">Guardar nueva contraseña</button>
    </form>

    <div id="message" class="meta" style="margin-top:16px;"></div>
    <button class="secondary" type="button" style="margin-top:16px;" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";
const token = localStorage.getItem("player_token");
if (!token) window.location.href = "player-login.html";

document.getElementById("changePasswordForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const currentPassword = document.getElementById("currentPassword").value;
  const newPassword = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const message = document.getElementById("message");
  const submitButton = document.getElementById("submitButton");

  if (newPassword.length < 8) {
    message.textContent = "❌ La nueva contraseña debe tener al menos 8 caracteres";
    return;
  }
  if (newPassword !== confirmPassword) {
    message.textContent = "❌ Las nuevas contraseñas no coinciden";
    return;
  }
  if (currentPassword === newPassword) {
    message.textContent = "❌ La nueva contraseña debe ser distinta de la temporal";
    return;
  }

  submitButton.disabled = true;
  message.textContent = "Guardando contraseña...";

  try {
    const response = await fetch(`${API_URL}/player/change-password`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        session_token: token,
        current_password: currentPassword,
        new_password: newPassword
      })
    });

    const result = await response.json();
    if (!response.ok) {
      const detail = typeof result.detail === "string"
        ? result.detail
        : result.detail?.message || "No se pudo cambiar la contraseña";
      message.textContent = `❌ ${detail}`;
      return;
    }

    localStorage.setItem("player_must_change_password", "false");
    message.textContent = "✅ Contraseña actualizada correctamente";
    window.location.href = "player-dashboard.html";
  } catch (error) {
    console.error(error);
    message.textContent = "❌ No fue posible conectar con PuntoRank";
  } finally {
    submitButton.disabled = false;
  }
});

async function logout() {
  try {
    await fetch(`${API_URL}/player/logout`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({session_token: token})
    });
  } finally {
    localStorage.removeItem("player_token");
    localStorage.removeItem("player_id");
    localStorage.removeItem("player_name");
    localStorage.removeItem("player_must_change_password");
    window.location.href = "player-login.html";
  }
}
</script>
</body>
</html>
