<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nueva contraseña - PuntoRank</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

<div class="card" style="max-width:520px;margin:60px auto;">
  <h1>Nueva contraseña</h1>
  <p class="meta">Ingresa tu nueva contraseña.</p>

  <label>Nueva contraseña</label>
  <input id="password" type="password" placeholder="Mínimo 6 caracteres">

  <label>Repetir contraseña</label>
  <input id="password2" type="password" placeholder="Repite tu contraseña">

  <button onclick="resetPassword()">Guardar nueva contraseña</button>

  <div id="message" class="meta" style="margin-top:16px;"></div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

async function resetPassword() {
  const password = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;
  const msg = document.getElementById("message");

  if (!token) {
    msg.innerHTML = "El enlace no tiene token válido.";
    return;
  }

  if (password.length < 6) {
    msg.innerHTML = "La contraseña debe tener al menos 6 caracteres.";
    return;
  }

  if (password !== password2) {
    msg.innerHTML = "Las contraseñas no coinciden.";
    return;
  }

  const response = await fetch(`${API_URL}/player/reset-password`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      token: token,
      new_password: password
    })
  });

  const result = await response.json();

  if (!response.ok) {
    msg.innerHTML = result.detail || "No se pudo actualizar la contraseña.";
    return;
  }

  msg.innerHTML = "✅ Contraseña actualizada. Ya puedes iniciar sesión.";

  setTimeout(() => {
    window.location.href = "player-login.html";
  }, 1800);
}
</script>

</body>
</html>
