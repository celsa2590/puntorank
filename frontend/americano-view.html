<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuntoRank - Americano</title>
  <link rel="stylesheet" href="theme.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C2T3VH6Q5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-5C2T3VH6Q5");
  </script>
</head>
<body>
<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

  <div class="brand" id="americanoName">Cargando americano...</div>

  <div class="card">
    <h2>Detalle</h2>
    <div class="meta" id="americanoDetail"></div>
  </div>

<div class="card">
  <h2>Jugadores inscritos</h2>
  <div id="playersList">Cargando jugadores...</div>
</div>

<div class="card">
  <h2>Crear pareja</h2>

  <label>Jugadora 1</label>
  <select id="pairPlayer1"></select>

  <label>Jugadora 2</label>
  <select id="pairPlayer2"></select>

  <label>Nombre pareja</label>
  <input type="text" id="pairName" placeholder="Ej: Celsa / Miraida">

  <button onclick="createPair()">Crear pareja</button>

  <h3>Parejas creadas</h3>
  <div id="pairsList">Cargando parejas...</div>
</div>

<div class="card">
  <h2>Partidos generados</h2>

  <button onclick="generateRounds()">
    Generar rondas
  </button>

<div id="generationSummary" class="meta" style="margin-top:16px;"></div>

<div id="matchesList" style="margin-top:16px;">
  Aún no se han generado rondas.
</div>

</div>

<div class="card">
  <h2>Tabla de posiciones</h2>
  <button id="finishButton" onclick="finishAmericano()">
    Finalizar Americano
  </button>

<div id="finishMessage" class="meta" style="margin-top:12px;"></div>

  <div id="standingsList">Cargando tabla...</div>
</div>
<script>

  const API_URL = "https://puntorank-backend.onrender.com";

  const params = new URLSearchParams(window.location.search);
  const americanoId = params.get("id");

  let americanoPlayers = [];

  if (!americanoId) {
    window.location.href = "americanos.html";
  }

  async function loadAmericano() {
    const response = await fetch(`${API_URL}/americanos/${americanoId}`);

    if (!response.ok) {
      document.getElementById("americanoName").innerText = "Americano no encontrado";
      return;
    }

    const americano = await response.json();

    document.getElementById("americanoName").innerText = americano.name;

    document.getElementById("americanoDetail").innerHTML = `
      Categoría: ${americano.category}<br>
      Género: ${americano.gender}<br>
      Canchas: ${americano.courts}<br>
      Duración bloque: ${americano.duration_minutes} min<br>
      Estado: ${americano.status}
    `;
  }

  async function loadPlayers() {
    const response = await fetch(`${API_URL}/americanos/${americanoId}/players`);
    const players = await response.json();
    americanoPlayers = players;
    fillPairSelectors(players);

    const list = document.getElementById("playersList");

    if (players.length === 0) {
      list.innerHTML = "Aún no hay jugadores inscritos.";
      return;
    }

    list.innerHTML = players.map(p => `
      <div class="player-row">
        <div>
          <strong>${p.name}</strong><br>
          <span class="meta">${p.category || ""} · ${p.side || "sin lado"}</span>
        </div>

        <button onclick="togglePaid(${p.id})" class="${p.paid ? "paid" : "unpaid"}">
          ${p.paid ? "Pagado" : "No pagado"}
        </button>

      </div>
    `).join("");
  }


async function loadStandings() {
  const response = await fetch(`${API_URL}/americanos/${americanoId}/standings`);
  const standings = await response.json();

  const list = document.getElementById("standingsList");

  if (standings.length === 0) {
    list.innerHTML = "Aún no hay tabla disponible.";
    return;
  }

  list.innerHTML = standings.map((row, index) => `
    <div class="player-row">
      <div>
        <strong>${index + 1}. ${row.pair_name}</strong><br>
        <span class="meta">
          Ganados: ${row.wins} · Perdidos: ${row.losses} · Games ganados: ${row.games_won}
        </span>
      </div>
    </div>
  `).join("");
}


function fillPairSelectors(players) {
  const select1 = document.getElementById("pairPlayer1");
  const select2 = document.getElementById("pairPlayer2");

  if (!select1 || !select2) return;

  select1.innerHTML = `<option value="">Selecciona jugadora</option>`;
  select2.innerHTML = `<option value="">Selecciona jugadora</option>`;

  players.forEach(p => {
    const option1 = document.createElement("option");
    option1.value = p.player_id;
    option1.textContent = p.name;

    const option2 = document.createElement("option");
    option2.value = p.player_id;
    option2.textContent = p.name;

    select1.appendChild(option1);
    select2.appendChild(option2);
  });
}

async function createPair() {
  const player1 = document.getElementById("pairPlayer1").value;
  const player2 = document.getElementById("pairPlayer2").value;
  const pairName = document.getElementById("pairName").value.trim();

  if (!player1 || !player2) {
    alert("Debes seleccionar dos jugadoras.");
    return;
  }

  if (player1 === player2) {
    alert("La pareja debe tener dos jugadoras distintas.");
    return;
  }

  const payload = {
    player_1_id: parseInt(player1),
    player_2_id: parseInt(player2),
    pair_name: pairName || null
  };

  const response = await fetch(`${API_URL}/americanos/${americanoId}/pairs`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    alert("No se pudo crear la pareja.");
    return;
  }

  document.getElementById("pairName").value = "";
  await loadPairs();
}

async function loadPairs() {
  const response = await fetch(`${API_URL}/americanos/${americanoId}/pairs`);
  const pairs = await response.json();

  const list = document.getElementById("pairsList");

  if (pairs.length === 0) {
    list.innerHTML = "Aún no hay parejas creadas.";
    return;
  }

  list.innerHTML = pairs.map(pair => `
    <div class="player-row">
      <div>
        <strong>${pair.pair_name || `${pair.player_1_name} / ${pair.player_2_name}`}</strong><br>
        <span class="meta">${pair.player_1_name} / ${pair.player_2_name}</span>
      </div>
    </div>
  `).join("");
}

async function togglePaid(americanoPlayerId) {
  await fetch(`${API_URL}/americanos/players/${americanoPlayerId}/toggle-paid`, {
    method: "POST"
  });

  loadPlayers();
}

async function generateRounds() {
  const response = await fetch(`${API_URL}/americanos/${americanoId}/generate-rounds`, {
    method: "POST"
  });

  if (!response.ok) {
    const error = await response.json();
    alert(error.detail || "No se pudieron generar rondas.");
    return;
  }

  const result = await response.json();

  document.getElementById("generationSummary").innerHTML = `
    Formato: ${result.format}<br>
    Parejas: ${result.pairs}<br>
    Partidos: ${result.matches_created}<br>
    Rondas: ${result.rounds_created}<br>
    Tiempo recomendado por partido: ${result.recommended_minutes_per_match} min
  `;

  await loadMatches();
}


async function loadMatches() {
  const response = await fetch(`${API_URL}/americanos/${americanoId}/matches`);
  const matches = await response.json();

  const list = document.getElementById("matchesList");

  if (matches.length === 0) {
    list.innerHTML = "Aún no se han generado rondas.";
    return;
  }

list.innerHTML = matches.map(m => `
  <div class="player-row">
    <div style="width:100%;">
      <strong>Ronda ${m.round_number} · Cancha ${m.court_number}</strong><br>

      <span class="meta">${m.pair_a_name}</span>
      <br>vs<br>
      <span class="meta">${m.pair_b_name}</span>

      <div style="margin-top:10px;">
        <input
          type="number"
          id="a_${m.match_id}"
          placeholder="Games pareja A"
          value="${m.pair_a_games !== null ? m.pair_a_games : ""}"
          style="width:130px; margin-right:8px;"
        >

        <input
          type="number"
          id="b_${m.match_id}"
          placeholder="Games pareja B"
          value="${m.pair_b_games !== null ? m.pair_b_games : ""}"
          style="width:130px; margin-right:8px;"
        >

        <button onclick="saveMatchResult(${m.match_id})">
          Guardar resultado
        </button>
      </div>

      <div class="meta">
        Resultado actual: ${m.score || "sin resultado"}
      </div>
    </div>
  </div>
`).join("");


}

async function saveMatchResult(matchId) {
  const pairAGames = parseInt(document.getElementById(`a_${matchId}`).value);
  const pairBGames = parseInt(document.getElementById(`b_${matchId}`).value);

  if (Number.isNaN(pairAGames) || Number.isNaN(pairBGames)) {
    alert("Debes ingresar los games de ambas parejas.");
    return;
  }

  const response = await fetch(`${API_URL}/americano-matches/${matchId}/result`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      pair_a_games: pairAGames,
      pair_b_games: pairBGames
    })
  });

  if (!response.ok) {
    alert("No se pudo guardar el resultado.");
    return;
  }

  await loadMatches();
  await loadStandings();
}

async function finishAmericano() {

  const confirmFinish = confirm(
    "¿Seguro que deseas finalizar el americano? Esto procesará el ranking."
  );

  if (!confirmFinish) {
    return;
  }

  const response = await fetch(
    `${API_URL}/americanos/${americanoId}/finish`,
    {
      method: "POST"
    }
  );

  const result = await response.json();

  if (!response.ok) {
    alert(result.detail || "No se pudo finalizar el americano.");
    return;
  }

  document.getElementById("finishMessage").innerHTML = `
    ✅ Americano finalizado correctamente.
  `;

const button = document.getElementById("finishButton");
button.innerText = "Finalizado";
button.disabled = true;
button.style.opacity = "0.6";
button.style.cursor = "not-allowed";

  await loadStandings();
}


loadAmericano();
loadPlayers();
loadPairs();
loadMatches();
loadStandings();

</script>

</body>
</html>
