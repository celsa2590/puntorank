<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuntoRank - Crear perfil</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .auth-shell { max-width: 560px; margin: 0 auto; }
    .hint { font-size: 13px; color: #6b7280; margin-top: 8px; line-height: 1.45; }
  </style>
</head>
<body>
<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

<div class="auth-shell">
  <div class="brand" style="margin-top:24px;">Crear perfil</div>
  <div class="subtitle">Crea tu cuenta para registrar partidos, validar resultados y seguir tu evolución.</div>

  <div class="card">
    <form id="registerForm">
      <label>Nombre y apellido</label>
      <input id="name" required placeholder="Ej: Celsa Sánchez">

      <label>Email</label>
      <input id="email" type="email" required placeholder="tu@email.com">

      <label>Clave</label>
      <input id="password" type="password" required minlength="6" placeholder="Mínimo 6 caracteres">

      <label>Club principal</label>
      <select id="club"><option value="">Cargando clubes...</option></select>

      <label>Género</label>
      <select id="gender" required>
        <option value="">Selecciona</option>
        <option value="femenino">Femenino</option>
        <option value="masculino">Masculino</option>
      </select>

      <label>Categoría</label>
      <select id="category" required>
        <option value="">Selecciona</option>
        <option value="6ta">6ta</option>
        <option value="5ta">5ta</option>
        <option value="4ta">4ta</option>
        <option value="3era">3era</option>
        <option value="2da">2da</option>
        <option value="1era">1era</option>
      </select>

      <label>Lado</label>
      <select id="side">
        <option value="">No definido</option>
        <option value="drive">Drive</option>
        <option value="reves">Revés</option>
      </select>

      <button type="submit">Crear mi perfil</button>
      <div class="hint">MVP: la verificación por correo queda preparada en backend; el envío real de email lo agregamos en el siguiente paso.</div>
    </form>

    <div id="message" class="meta" style="margin-top:16px;"></div>
  </div>

  <div class="meta" style="margin-top:14px;">¿Ya tienes cuenta? <a href="player-login.html">Ingresar</a></div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";

async function loadClubs() {
  const select = document.getElementById("club");
  try {
    const response = await fetch(`${API_URL}/clubs`);
    const clubs = await response.json();
    select.innerHTML = `<option value="">Sin club principal</option>` +
      clubs.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
  } catch (error) {
    select.innerHTML = `<option value="">No se pudieron cargar clubes</option>`;
  }
}

document.getElementById("registerForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const message = document.getElementById("message");
  message.innerHTML = "Creando perfil...";

  const payload = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim().toLowerCase(),
    password: document.getElementById("password").value,
    club_id: document.getElementById("club").value ? parseInt(document.getElementById("club").value) : null,
    gender: document.getElementById("gender").value,
    category: document.getElementById("category").value,
    side: document.getElementById("side").value || null
  };

  const response = await fetch(`${API_URL}/player/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  const result = await response.json();

  if (!response.ok) {
    message.innerHTML = `❌ ${result.detail || "No se pudo crear el perfil"}`;
    return;
  }

  localStorage.setItem("player_token", result.session.token);
  localStorage.setItem("player_id", result.player.id);
  localStorage.setItem("player_name", result.player.name);
  window.location.href = "player-dashboard.html";
});

loadClubs();
</script>
</body>
</html>
