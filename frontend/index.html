<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PuntoRank</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

  <section class="hero">
    <div class="brand">PuntoRank</div>
    <div class="subtitle">
      Ranking validado de jugadores de pádel. Registra partidos, mide tu nivel y compite en el ranking del club.
    </div>

    <div class="actions">
      <a class="btn" href="ranking.html">Ver ranking completo</a>
      <a class="btn secondary" href="club-login.html">Panel clubes</a>
      <a class="btn secondary" href="register.html">Crear perfil</a>
    </div>
  </section>

  <h2 class="section-title">🏆 Top 5 Femenino</h2>
  <div id="topFemenino"></div>

  <h2 class="section-title">🏆 Top 5 Masculino</h2>
  <div id="topMasculino"></div>

<script>
  const API_URL = "https://puntorank-backend.onrender.com";

  async function loadTopFive() {
    try {
      const femenino = await fetch(`${API_URL}/ranking?club_id=1&gender=femenino`);
      const masculino = await fetch(`${API_URL}/ranking?club_id=1&gender=masculino`);

      const dataF = await femenino.json();
      const dataM = await masculino.json();

      renderTop(dataF.slice(0, 5), "topFemenino");
      renderTop(dataM.slice(0, 5), "topMasculino");

    } catch (error) {
      console.error(error);
      document.getElementById("topFemenino").innerHTML = "Error cargando ranking femenino.";
      document.getElementById("topMasculino").innerHTML = "Error cargando ranking masculino.";
    }
  }

  function renderTop(players, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    if (players.length === 0) {
      container.innerHTML = "Sin datos.";
      return;
    }

    players.forEach((player, index) => {
      const card = document.createElement("div");

      let topClass = "";
      if (index === 0) topClass = "top1";
      if (index === 1) topClass = "top2";
      if (index === 2) topClass = "top3";

      card.className = `ranking-card ${topClass}`;

      card.innerHTML = `
        <div class="position">${index + 1}</div>

        <div>
          <div class="name" onclick="goToProfile(${player.player_id})">
            ${index === 0 ? "👑 " : ""}${player.player_name}
          </div>
          <div class="club">${player.club_name || "Club no asignado"}</div>
        </div>

        <div class="rating">${player.rating}</div>
      `;

      container.appendChild(card);
    });
  }

  function goToProfile(playerId) {
    window.location.href = `player-profile.html?id=${playerId}`;
  }

  loadTopFive();
</script>

</body>
</html>
