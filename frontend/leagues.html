<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PuntoRank - Ligas</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

<div class="brand">Ligas</div>
<div class="meta" id="clubLabel"></div>

<div class="card">
  <h2>Nueva liga</h2>

  <input id="leagueName" placeholder="Nombre liga">

  <select id="leagueCategory">
    <option>6ta</option>
    <option>5ta</option>
    <option>4ta</option>
    <option>3era</option>
    <option>2da</option>
    <option>1era</option>
  </select>

  <select id="leagueGender">
    <option value="femenino">Femenino</option>
    <option value="masculino">Masculino</option>
  </select>

  <button onclick="createLeague()">Crear liga</button>
</div>

<div class="card">
  <h2>Ligas en juego</h2>
  <div id="activeLeagues">Cargando...</div>
</div>

<div class="card">
  <h2>Ligas finalizadas</h2>
  <div id="completedLeagues">Cargando...</div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";

const clubId = localStorage.getItem("club_id");
const clubName = localStorage.getItem("club_name");

if (!clubId) {
  window.location.href = "club-login.html";
}

document.getElementById("clubLabel").innerText = `Club: ${clubName}`;

async function loadLeagues() {
  const response = await fetch(`${API_URL}/club/${clubId}/leagues`);
  const leagues = await response.json();

  const active = leagues.filter(l => l.status !== "completed");
  const completed = leagues.filter(l => l.status === "completed");

  renderLeagueList(active, "activeLeagues", "No hay ligas en juego.");
  renderLeagueList(completed, "completedLeagues", "No hay ligas finalizadas.");
}

function renderLeagueList(leagues, containerId, emptyText) {
  const container = document.getElementById(containerId);

  if (leagues.length === 0) {
    container.innerHTML = emptyText;
    return;
  }

  container.innerHTML = leagues.map(l => `
    <div class="row">
      <strong>${l.name}</strong><br>

      <span class="meta">
        ${l.category} · ${l.gender}<br>
        Parejas: ${l.pairs_count}<br>
        Estado: ${l.status}
      </span><br>

      <a class="btn" href="league-view.html?id=${l.id}">
        Abrir liga
      </a>
    </div>
  `).join("");
}

async function createLeague() {
  const name = document.getElementById("leagueName").value.trim();

  if (!name) {
    alert("Debes ingresar el nombre de la liga.");
    return;
  }

  const response = await fetch(`${API_URL}/leagues`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      club_id: parseInt(clubId),
      name,
      category: document.getElementById("leagueCategory").value,
      gender: document.getElementById("leagueGender").value
    })
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.detail || "No se pudo crear la liga.");
    return;
  }

  document.getElementById("leagueName").value = "";
  await loadLeagues();
}

loadLeagues();
</script>

</body>
</html>
