<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuntoRank - Login Club</title>
  <link rel="stylesheet" href="theme.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C2T3VH6Q5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-5C2T3VH6Q5");
  </script>
</head>
<body>
<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

  <div class="brand">PuntoRank</div>
  <div class="subtitle">Ingreso para clubes</div>

  <div class="card">
    <form id="loginForm">
      <label>Usuario</label>
      <input type="text" id="username" required placeholder="espacioactive">

      <label>Clave</label>
      <input type="password" id="password" required placeholder="1234">

      <button type="submit">Ingresar</button>
    </form>

    <div id="message" class="error"></div>
  </div>

<script>
  const API_URL = "https://puntorank-backend.onrender.com";

  document.getElementById("loginForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const message = document.getElementById("message");
    message.innerHTML = "";

    const payload = {
      username: document.getElementById("username").value.trim(),
      password: document.getElementById("password").value.trim()
    };

    try {
      const response = await fetch(`${API_URL}/club/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error("Login inválido");
      }

      const club = await response.json();

      localStorage.setItem("club_logo", club.logo_url || "");
      localStorage.setItem("club_id", club.id);
      localStorage.setItem("club_name", club.name);
      localStorage.setItem("club_token", club.session_token);

      window.location.href = "club-dashboard.html";

    } catch (error) {
      console.error(error);
      message.innerHTML = "Usuario o clave incorrectos.";
    }
  });
</script>

</body>
</html>
