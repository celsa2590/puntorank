<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PuntoRank - Ingreso jugador</title>
  <link rel="stylesheet" href="theme.css">
  <style>.auth-shell{max-width:480px;margin:0 auto;}</style>
</head>
<body>
<div class="top-nav">
  <a class="nav-icon" href="index.html">🏠 Inicio</a>
  <button class="nav-icon" onclick="history.back()">← Volver</button>
</div>

<div class="auth-shell">
  <div class="brand" style="margin-top:24px;">Iniciar sesión</div>
  <div class="subtitle">Accede a tu cuenta para registrar partidos y ver tu evolución.</div>

  <div class="card">
    <form id="loginForm">
      <label>Email</label>
      <input id="email" type="email" required placeholder="tu@email.com">
      <label>Clave</label>
      <input id="password" type="password" required placeholder="Tu clave">
      <button type="submit">Ingresar</button>
    </form>
  <div style="margin-top:14px;">
    <a href="player-forgot-password.html">¿Olvidaste tu contraseña?</a>
  </div>

    <div id="message" class="meta" style="margin-top:16px;"></div>
  </div>

  <div class="meta" style="margin-top:14px;">¿No tienes cuenta? <a href="register.html">Crear perfil</a></div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";

document.getElementById("loginForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const message = document.getElementById("message");
  message.innerHTML = "Ingresando...";

  try {
    const response = await fetch(`${API_URL}/player/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value.trim().toLowerCase(),
        password: document.getElementById("password").value
      })
    });

    const result = await response.json();

    if (!response.ok) {
      message.innerHTML = `❌ ${result.detail || "No se pudo ingresar"}`;
      return;
    }

    localStorage.setItem("player_token", result.session.token);
    localStorage.setItem("player_id", result.player.id);
    localStorage.setItem("player_name", result.player.name);

    const redirect = localStorage.getItem("after_login_redirect");
    if (redirect) {
      localStorage.removeItem("after_login_redirect");
      window.location.href = redirect;
    } else {
      window.location.href = "player-dashboard.html";
    }
  } catch (error) {
    console.error(error);
    message.innerHTML = "❌ No se pudo conectar con PuntoRank. Intenta nuevamente.";
  }
});
</script>
</body>
</html>
