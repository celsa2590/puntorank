<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuntoRank - Ingreso jugador</title>
  <link rel="stylesheet" href="theme.css">
  <style>.auth-shell{max-width:480px;margin:0 auto;}</style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C2T3VH6Q5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-5C2T3VH6Q5");
  </script>
</head>
<body>
<div class="auth-shell">
  <a class="btn secondary" href="index.html">← Volver</a>
  <div class="brand" style="margin-top:24px;">Iniciar sesión</div>
  <div class="subtitle">Accede a tu cuenta para registrar partidos y ver tu evolución.</div>

  <div class="card">
    <form id="loginForm">
      <label>Email</label>
      <input id="email" type="email" autocomplete="email" required placeholder="tu@email.com">
      <label>Clave</label>
      <input id="password" type="password" autocomplete="current-password" required placeholder="Tu clave">
      <button id="submitButton" type="submit">Ingresar</button>
    </form>

    <div style="margin-top:14px;">
      <a href="player-forgot-password.html">¿Olvidaste tu contraseña?</a>
    </div>

    <div id="message" class="meta" style="margin-top:16px;"></div>
  </div>

  <div class="meta" style="margin-top:14px;">¿No tienes cuenta? <a href="register.html">Crear perfil</a></div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";

document.getElementById("loginForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const message = document.getElementById("message");
  const submitButton = document.getElementById("submitButton");
  message.textContent = "Ingresando...";
  submitButton.disabled = true;

  try {
    const response = await fetch(`${API_URL}/player/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value.trim().toLowerCase(),
        password: document.getElementById("password").value
      })
    });

    const result = await response.json();

    if (!response.ok) {
      message.textContent = `❌ ${result.detail || "No se pudo ingresar"}`;
      return;
    }

    localStorage.setItem("player_token", result.session.token);
    localStorage.setItem("player_id", String(result.player.id));
    localStorage.setItem("player_name", result.player.name);

    const mustChangePassword =
      result.must_change_password === true ||
      result.player?.must_change_password === true;

    localStorage.setItem(
      "player_must_change_password",
      mustChangePassword ? "true" : "false"
    );

    if (mustChangePassword) {
      window.location.href = "player-change-password.html";
      return;
    }

    const redirect = localStorage.getItem("after_login_redirect");
    if (redirect) {
      localStorage.removeItem("after_login_redirect");
      window.location.href = redirect;
    } else {
      window.location.href = "player-dashboard.html";
    }
  } catch (error) {
    console.error(error);
    message.textContent = "❌ No fue posible conectar con PuntoRank";
  } finally {
    submitButton.disabled = false;
  }
});
</script>
</body>
</html>
