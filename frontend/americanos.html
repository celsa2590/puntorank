<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PuntoRank - Americanos</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1b2b22 0%, #0f0f0f 45%);
      color: white;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .brand {
      color: #8dff9f;
      font-size: 38px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #bbb;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(26,26,26,0.95);
      border: 1px solid #333;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .card:hover {
      border-color: #8dff9f;
      transform: translateY(-2px);
    }

    .title {
      font-size: 22px;
      font-weight: 900;
    }

    .meta {
      margin-top: 8px;
      color: #aaa;
      line-height: 1.5;
    }

    .topbar {
      margin-bottom: 20px;
    }

    .btn {
      background: #8dff9f;
      color: #111;
      border: none;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="brand">Americanos</div>
  <div class="subtitle" id="clubInfo"></div>

  <div class="topbar">
    <a class="btn" href="americano-create.html">
      ➕ Crear Americano
    </a>
  </div>

  <div id="americanosContainer">
    Cargando americanos...
  </div>

<script>
  const API_URL = "https://puntorank-backend.onrender.com";

  const clubId = localStorage.getItem("club_id");
  const clubName = localStorage.getItem("club_name");

  if (!clubId) {
    window.location.href = "club-login.html";
  }

  document.getElementById("clubInfo").innerText = `Club: ${clubName}`;

  async function loadAmericanos() {

    try {

      const response = await fetch(`${API_URL}/club/${clubId}/americanos`);

      if (!response.ok) {
        throw new Error("Error cargando americanos");
      }

      const americanos = await response.json();

      const container = document.getElementById("americanosContainer");

      if (americanos.length === 0) {
        container.innerHTML = "Aún no hay americanos creados.";
        return;
      }

      container.innerHTML = "";

      americanos.forEach(americano => {

        const card = document.createElement("div");

        card.className = "card";

        card.onclick = () => {
          window.location.href = `americano-view.html?id=${americano.id}`;
        };

        card.innerHTML = `
          <div class="title">${americano.name}</div>

          <div class="meta">
            Categoría: ${americano.category}<br>
            Género: ${americano.gender}<br>
            Jugadores: ${americano.players_count}<br>
            Canchas: ${americano.courts}<br>
            Estado: ${americano.status}
          </div>
        `;

        container.appendChild(card);

      });

    } catch (error) {
      console.error(error);
      document.getElementById("americanosContainer").innerHTML =
        "Error cargando americanos.";
    }
  }

  loadAmericanos();
</script>

</body>
</html>
