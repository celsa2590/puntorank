<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liga | PuntoRank</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
<div class="container">

  <div class="top-nav">
    <a class="btn secondary" href="index.html">🏠 Inicio</a>
    <a class="btn secondary" href="public-leagues.html">Ligas</a>
    <a class="btn secondary" href="ranking.html">Ranking</a>
  </div>

  <div id="leagueHeader" class="card"></div>

  <div class="tabs">
    <button type="button" class="tab active" data-tab="summary">📋 Resumen</button>
    <button type="button" class="tab" data-tab="standings">🏆 Posiciones</button>
    <button type="button" class="tab" data-tab="matches">📅 Fixture</button>
    <button type="button" class="tab" data-tab="participants">👥 Participantes</button>
    <button type="button" class="tab" data-tab="stats">📊 Estadísticas</button>
  </div>

  <section id="summary" class="tab-content"></section>
  <section id="standings" class="tab-content" hidden></section>
  <section id="matches" class="tab-content" hidden></section>
  <section id="participants" class="tab-content" hidden></section>
  <section id="stats" class="tab-content" hidden></section>

</div>

<script type="module" src="league-public/index.js"></script>

<script>
  document.addEventListener("click", function (event) {
    const tab = event.target.closest(".tab");
    if (!tab) return;

    const tabId = tab.dataset.tab;

    document.querySelectorAll(".tab").forEach(function (button) {
      button.classList.toggle("active", button.dataset.tab === tabId);
    });

    document.querySelectorAll(".tab-content").forEach(function (section) {
      section.hidden = section.id !== tabId;
    });
  });
</script>

</body>
</html>
