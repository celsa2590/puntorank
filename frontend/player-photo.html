<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>PuntoRank - Foto de perfil</title>
  <link rel="stylesheet" href="theme.css">

  <style>
    .photo-shell {
      max-width: 560px;
      margin: 0 auto;
    }

    .preview-wrapper {
      display: flex;
      justify-content: center;
      margin: 24px 0;
    }

    .photo-preview {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      background: #eef2ee;
      border: 4px solid white;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
    }

    .file-zone {
      display: block;
      padding: 22px;
      text-align: center;
      border: 2px dashed #9fcca0;
      border-radius: 18px;
      cursor: pointer;
      background: #f7fbf7;
      margin: 18px 0;
    }

    .file-zone input {
      display: none;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      display: none;
    }

    .status.visible {
      display: block;
    }

    .status.success {
      background: #ecfdf3;
      color: #166534;
    }

    .status.error {
      background: #fef2f2;
      color: #991b1b;
    }
  </style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C2T3VH6Q5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-5C2T3VH6Q5");
  </script>
</head>

<body>
<div class="top-nav">
  <a
    class="nav-icon"
    href="player-dashboard.html"
  >
    ← Volver
  </a>

  <a class="nav-icon" href="index.html">
    🏠 Inicio
  </a>
</div>

<div class="photo-shell">
  <h1>Foto de perfil</h1>

  <p class="subtitle">
    Selecciona una imagen JPG, PNG o WEBP.
    El tamaño máximo es 5 MB.
  </p>

  <div class="card">
    <div class="preview-wrapper">
      <img
        id="photoPreview"
        class="photo-preview"
        alt="Vista previa"
        src=""
      >
    </div>

    <label class="file-zone">
      <strong>Seleccionar una foto</strong>
      <br>
      <span class="meta">
        La imagen será recortada en formato cuadrado.
      </span>

      <input
        id="photoInput"
        type="file"
        accept="image/jpeg,image/png,image/webp"
      >
    </label>

    <button
      id="uploadButton"
      type="button"
      disabled
      onclick="uploadPhoto()"
    >
      Guardar foto
    </button>

    <div id="statusBox" class="status"></div>
  </div>
</div>

<script>
const API_URL =
  "https://puntorank-backend.onrender.com";

const sessionToken =
  localStorage.getItem("player_token");

const photoInput =
  document.getElementById("photoInput");

const photoPreview =
  document.getElementById("photoPreview");

const uploadButton =
  document.getElementById("uploadButton");

const statusBox =
  document.getElementById("statusBox");

let selectedFile = null;
let previewUrl = null;

const currentPhotoUrl =
  localStorage.getItem("player_photo_url");

if (currentPhotoUrl) {
  photoPreview.src = currentPhotoUrl;
}

if (!sessionToken) {
  window.location.href = "player-login.html";
}

photoInput.addEventListener("change", () => {
  const file = photoInput.files[0];

  if (!file) {
    selectedFile = null;
    uploadButton.disabled = true;
    return;
  }

  const allowedTypes = [
    "image/jpeg",
    "image/png",
    "image/webp"
  ];

  if (!allowedTypes.includes(file.type)) {
    showStatus(
      "error",
      "Selecciona una imagen JPG, PNG o WEBP."
    );
    photoInput.value = "";
    return;
  }

  if (file.size > 5 * 1024 * 1024) {
    showStatus(
      "error",
      "La imagen supera el máximo de 5 MB."
    );
    photoInput.value = "";
    return;
  }

  selectedFile = file;
  uploadButton.disabled = false;

  if (previewUrl) {
    URL.revokeObjectURL(previewUrl);
  }

  previewUrl = URL.createObjectURL(file);
  photoPreview.src = previewUrl;

  hideStatus();
});

async function uploadPhoto() {
  if (!selectedFile) {
    showStatus(
      "error",
      "Primero selecciona una imagen."
    );
    return;
  }

  uploadButton.disabled = true;
  uploadButton.textContent = "Guardando...";

  const formData = new FormData();

  formData.append(
    "session_token",
    sessionToken
  );

  formData.append(
    "photo",
    selectedFile
  );

  try {
    const response = await fetch(
      `${API_URL}/player/photo`,
      {
        method: "POST",
        body: formData
      }
    );

    const result = await response.json();

    if (!response.ok) {
      const detail =
        typeof result.detail === "string"
          ? result.detail
          : result.detail?.message ||
            "No se pudo guardar la foto";

      showStatus("error", detail);
      return;
    }

    photoPreview.src =
      `${result.photo_url}?v=${Date.now()}`;

    localStorage.setItem(
      "player_photo_url",
      result.photo_url
    );

    selectedFile = null;
    photoInput.value = "";

    showStatus(
      "success",
      "Foto actualizada correctamente."
    );

    setTimeout(() => {
      window.location.href =
        "player-dashboard.html";
    }, 1200);

  } catch (error) {
    console.error(error);

    showStatus(
      "error",
      "No fue posible conectar con PuntoRank."
    );
  } finally {
    uploadButton.disabled = false;
    uploadButton.textContent = "Guardar foto";
  }
}

function showStatus(type, message) {
  statusBox.className =
    `status visible ${type}`;

  statusBox.textContent = message;
}

function hideStatus() {
  statusBox.className = "status";
  statusBox.textContent = "";
}
</script>
</body>
</html>
