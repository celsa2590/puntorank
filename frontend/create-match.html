<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PuntoRank - Registrar partido</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .match-shell { max-width: 760px; margin: 0 auto; }
    .team-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .share-box { background:#f8faf8; border:1px solid #e5e7eb; border-radius:16px; padding:14px; margin-top:14px; }
    @media(max-width:700px){.team-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="match-shell">
  <a class="btn secondary" href="player-dashboard.html">← Mi cuenta</a>
  <div class="brand" style="margin-top:24px;">Registrar partido</div>
  <div class="subtitle">Carga el resultado y compártelo para que un rival lo valide.</div>

  <div class="card">
    <label>Club donde se jugó</label>
    <select id="clubSelect"></select>

    <label>Categoría</label>
    <select id="category">
      <option value="">No definir</option>
      <option value="6ta">6ta</option><option value="5ta">5ta</option><option value="4ta">4ta</option>
      <option value="3era">3era</option><option value="2da">2da</option><option value="1era">1era</option>
    </select>

    <h3>Equipo A</h3>
    <div class="team-grid"><select id="a1"></select><select id="a2"></select></div>

    <h3>Equipo B</h3>
    <div class="team-grid"><select id="b1"></select><select id="b2"></select></div>

    <label>Resultado</label>
    <input id="score" placeholder="Ej: 6-4 7-5">

    <label>Ganador</label>
    <select id="winner"><option value="A">Equipo A</option><option value="B">Equipo B</option></select>

    <button onclick="createMatch()">Crear partido</button>
    <div id="message" class="meta" style="margin-top:16px;"></div>
    <div id="shareBox"></div>
  </div>
</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";
const token = localStorage.getItem("player_token");
if (!token) window.location.href = "player-login.html";

let me = null;
let players = [];

async function init() {
  const meResp = await fetch(`${API_URL}/player/me?token=${encodeURIComponent(token)}`);
  me = await meResp.json();
  if (!meResp.ok) {
    window.location.href = "player-login.html";
    return;
  }
  await loadClubs();
  await loadPlayers();
}

async function loadClubs() {
  const response = await fetch(`${API_URL}/clubs`);
  const clubs = await response.json();
  document.getElementById("clubSelect").innerHTML =
    clubs.map(c => `<option value="${c.id}" ${me.club_id === c.id ? "selected" : ""}>${c.name}</option>`).join("");
}

async function loadPlayers() {
  const response = await fetch(`${API_URL}/players`);
  players = await response.json();
  const options = players.map(p => `<option value="${p.id}" ${p.id === me.id ? "selected" : ""}>${p.name}</option>`).join("");
  ["a1","a2","b1","b2"].forEach(id => document.getElementById(id).innerHTML = options);
  document.getElementById("a1").value = me.id;
}

async function createMatch() {
  const ids = ["a1","a2","b1","b2"].map(id => parseInt(document.getElementById(id).value));

  if (new Set(ids).size !== 4) {
    alert("Debes seleccionar 4 jugadores distintos.");
    return;
  }

  if (!ids.includes(me.id)) {
    alert("Debes estar dentro del partido que estás creando.");
    return;
  }

  const payload = {
    session_token: token,
    club_id: parseInt(document.getElementById("clubSelect").value),
    team_a_player_ids: [ids[0], ids[1]],
    team_b_player_ids: [ids[2], ids[3]],
    score: document.getElementById("score").value.trim(),
    winning_team: document.getElementById("winner").value,
    category: document.getElementById("category").value || null
  };

  const response = await fetch(`${API_URL}/player/matches/report`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  const result = await response.json();

  if (!response.ok) {
    document.getElementById("message").innerHTML = `❌ ${result.detail || "No se pudo crear el partido"}`;
    return;
  }

  const url = `${window.location.origin}/${result.validation_path}`;
  document.getElementById("message").innerHTML = "✅ Partido creado. Compártelo para validación.";
  document.getElementById("shareBox").innerHTML = `
    <div class="share-box">
      <strong>Link de validación</strong><br>
      <a href="${url}">${url}</a><br><br>
      <button onclick="navigator.clipboard.writeText('${url}')">Copiar link</button>
      <div class="meta" style="margin-top:10px;">En el siguiente paso agregamos QR visual. Por ahora este link cumple el mismo flujo.</div>
    </div>
  `;
}

init();
</script>
</body>
</html>
