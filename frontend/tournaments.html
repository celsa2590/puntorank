<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneos | PuntoRank</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
<div class="container">

  <div class="top-nav">
    <a class="btn secondary" href="index.html">🏠 Inicio</a>
    <a class="btn secondary" href="ranking.html">Ranking</a>
    <a class="btn secondary" href="public-leagues.html">Ligas</a>
    <a class="btn secondary" href="player-login.html">Ingresar jugador</a>
    <a class="btn secondary" href="club-login.html">Ingreso clubes</a>
  </div>

  <h1>Torneos PuntoRank</h1>
  <p class="meta">Explora los torneos activos, sus participantes, cruces y resultados.</p>

  <div id="tournamentsContainer" class="grid"></div>

</div>

<script>
const API_URL = "https://puntorank-backend.onrender.com";

function statusLabel(status) {
  const labels = {
    draft: "Borrador",
    registration: "Inscripción",
    groups_ready: "Grupos listos",
    group_stage: "Fase de grupos",
    playoff: "Playoff",
    completed: "Finalizado"
  };
  return labels[status] || status || "Sin estado";
}

async function loadTournaments() {
  const container = document.getElementById("tournamentsContainer");
  container.innerHTML = `<div class="card">Cargando torneos...</div>`;

  try {
    const res = await fetch(`${API_URL}/public/tournaments`);
    const tournaments = await res.json();

    container.innerHTML = "";

    if (!res.ok) {
      container.innerHTML = `<div class="card">No se pudieron cargar los torneos.</div>`;
      return;
    }

    if (!tournaments.length) {
      container.innerHTML = `<div class="card">Aún no hay torneos públicos.</div>`;
      return;
    }

    tournaments.forEach(t => {
      const card = document.createElement("div");
      card.className = "card";

      const logo = t.club_logo_url
        ? `<img src="${t.club_logo_url}" class="club-logo small" alt="${t.club_name || "Club"}">`
        : `<div class="club-logo small fallback-logo">🏟️</div>`;

      card.innerHTML = `
        <div class="league-card-row">
          ${logo}
          <div style="flex:1; min-width:0;">
            <h3>${t.name}</h3>
            <p class="meta">${t.club_name || "Club no asignado"} · ${t.category || ""} · ${t.gender || ""}</p>
            <p>
              <strong>${t.pairs_count || 0}</strong> parejas
              · <strong>${t.groups_count || 0}</strong> grupos
              · <strong>${t.matches_count || 0}</strong> partidos
            </p>
            <p class="meta">Estado: <strong>${statusLabel(t.status)}</strong></p>
            <a class="btn" href="tournament-public.html?id=${t.id}">Ver torneo</a>
          </div>
        </div>
      `;

      container.appendChild(card);
    });

  } catch (error) {
    console.error(error);
    container.innerHTML = `<div class="card">Error cargando torneos.</div>`;
  }
}

loadTournaments();
</script>
</body>
</html>
